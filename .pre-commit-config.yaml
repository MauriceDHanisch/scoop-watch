repos:
  - repo: local
    hooks:
      - id: lint
        name: Ruff Lint
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true

      - id: format
        name: Ruff Format
        entry: make format
        language: system
        pass_filenames: false
        always_run: true

      - id: typecheck
        name: Type Check
        entry: make typecheck
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: Pytest
        entry: make test
        language: system
        pass_filenames: false
        always_run: true
